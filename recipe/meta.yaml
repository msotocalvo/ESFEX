{% set name = "esfex" %}
{% set version = "0.1.0" %}

# ---------------------------------------------------------------------------
# conda-forge recipe for ESFEX, in the conda-forge/staged-recipes layout.
#
# STATUS: ready, but BLOCKED. conda-forge requires every run dependency to be
# available on conda-forge. juliacall ships there as `pyjuliacall` (wired up
# below); the four companion packages below are published on PyPI only, so
# they stay commented out and the recipe cannot be submitted/built until they
# land on conda-forge:
#
#     windrex, solarex, rooftex, evrex
#
# Once those exist on conda-forge, uncomment them in `requirements: run:` and
# open a PR adding `recipe/` to https://github.com/conda-forge/staged-recipes.
# (source.sha256 below is already filled for the esfex 0.1.0 PyPI sdist.)
# ---------------------------------------------------------------------------

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3ffae27ed94128ec0888309fcf2a753511ed32fbeff67cd942f539237ae4b736  # esfex 0.1.0 sdist

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - esfex = esfex.cli:_entrypoint

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools >=61
    - wheel
  run:
    - python >=3.10
    - numpy >=1.24.0
    - pandas >=2.0.0
    - h5py >=3.8.0
    - pydantic >=2.0.0
    - pyyaml >=6.0
    - typer >=0.9.0
    - networkx >=3.0
    - openpyxl >=3.1.0
    - rich >=13.0.0
    - psutil >=5.9.0
    - scipy >=1.10.0
    - pyside6 >=6.5.0
    - superqt >=0.6.0
    - markdown >=3.4
    - ptyprocess >=0.7.0  # [unix]
    - pyjuliacall >=0.9.14   # conda-forge package name for juliacall
    # --- PyPI-only, NOT yet on conda-forge: uncomment when available ---
    # - windrex >=0.1.0
    # - solarex >=0.1.0
    # - rooftex >=0.1.0
    # - evrex >=0.1.0

test:
  imports:
    - esfex
  commands:
    - esfex --help

about:
  home: https://github.com/Net-Zero-Horizon/ESFEX
  summary: "Energy System FlEXibility — hybrid Python/Julia power system capacity expansion and operational dispatch"
  description: |
    ESFEX (Energy System FlEXibility) is an open-source hybrid Python/Julia
    framework for power system capacity expansion and operational dispatch
    under high renewable penetration. It couples a strategic capacity
    expansion planner with a detailed operational dispatch engine through a
    two-stage decomposition, so investment decisions are operationally
    validated before being accepted. It supports DC/AC optimal power flow,
    N-1 security, frequency stability, battery storage, sector coupling
    (electrolyzer, primary energy, EV/V2G, rooftop solar), MGA/SPORES,
    stochastic programming, Sobol sensitivity, and a GIS-based Studio.
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  doc_url: https://github.com/Net-Zero-Horizon/ESFEX#readme
  dev_url: https://github.com/Net-Zero-Horizon/ESFEX

extra:
  recipe-maintainers:
    - msotocalvo
