name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # Lint — informational only (the codebase is not yet ruff-clean, so   #
  # this must not gate the badge). Tighten to a blocking check after a  #
  # `ruff check --fix` cleanup pass.                                    #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      # Informational: surfaces issues as annotations without failing the
      # build (the codebase is not yet ruff-clean). Drop --exit-zero to gate
      # once a `ruff check --fix` cleanup has landed.
      - run: ruff check --output-format=github --exit-zero src tests

  # ------------------------------------------------------------------ #
  # Test matrix — Python-side suite across 3.10–3.12.                   #
  # Julia-backed optimization tests are deselected (`-m "not julia"`):  #
  # juliacall auto-provisions its private Julia on import, so the       #
  # heavy JuMP/Ipopt/HiGHS solves are skipped to keep CI fast. The GUI  #
  # (PySide6 + QtWebEngine) runs under a virtual X server via xvfb.     #
  # ------------------------------------------------------------------ #
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      QTWEBENGINE_DISABLE_SANDBOX: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt / QtWebEngine system libraries
        uses: tlambert03/setup-qt-libs@v1

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb

      # Non-editable install: the modern setuptools editable finder resolves
      # some sub-modules (e.g. esfex.visualization.i18n) as namespace packages
      # under pytest ("unknown location"); a regular install avoids that.
      # matplotlib/plotly/SALib and the other former extras are now core
      # dependencies, so only the dev extra (pytest, etc.) is needed here.
      - name: Install package (with dev extra)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests (excluding Julia optimization)
        run: xvfb-run -a pytest tests/ -m "not julia" --cov=esfex --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          slug: Net-Zero-Horizon/ESFEX
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  # ------------------------------------------------------------------ #
  # Julia core — native ESFEX.jl unit tests with line coverage. The     #
  # full LP/MIP/NLP model builds and solves are exercised end-to-end by #
  # the `julia`-marked Python tests; this job covers the .jl sources.   #
  # ------------------------------------------------------------------ #
  julia:
    name: Julia core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.11"
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
        with:
          project: src/esfex/julia
      - uses: julia-actions/julia-runtest@v1
        with:
          project: src/esfex/julia
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src/esfex/julia/src
      - name: Upload Julia coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          slug: Net-Zero-Horizon/ESFEX
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
        continue-on-error: true

  # ------------------------------------------------------------------ #
  # Build — sdist + wheel, validated with twine. Gates the badge.      #
  # ------------------------------------------------------------------ #
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ------------------------------------------------------------------ #
  # Publish to PyPI on a published GitHub release, via Trusted          #
  # Publishing (OIDC) — no API token stored in the repository.         #
  # Requires a "pending publisher" configured on PyPI:                  #
  #   owner: Net-Zero-Horizon · repo: ESFEX · workflow: ci.yml · env: pypi    #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/esfex
    permissions:
      id-token: write   # mandatory for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
