name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # Lint — informational only (the codebase is not yet ruff-clean, so   #
  # this must not gate the badge). Tighten to a blocking check after a  #
  # `ruff check --fix` cleanup pass.                                    #
  # ------------------------------------------------------------------ #
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check --output-format=github src tests

  # ------------------------------------------------------------------ #
  # Test matrix — Python-side suite across 3.10–3.12.                   #
  # Julia-backed optimization tests are deselected (`-m "not julia"`):  #
  # juliacall auto-provisions its private Julia on import, so the       #
  # heavy JuMP/Ipopt/HiGHS solves are skipped to keep CI fast. The GUI  #
  # (PySide6 + QtWebEngine) runs under a virtual X server via xvfb.     #
  # ------------------------------------------------------------------ #
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Qt / QtWebEngine system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1 libegl1 libxkbcommon0 libdbus-1-3 libglib2.0-0 \
            libnss3 libnspr4 libxcomposite1 libxdamage1 libxrandr2 \
            libxtst6 libxi6 libxcb-cursor0 libasound2t64 libxshmfence1 \
            libgbm1 fonts-dejavu-core

      - name: Install package (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests (excluding Julia optimization)
        run: xvfb-run -a pytest tests/ -m "not julia" --cov=esfex --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  # ------------------------------------------------------------------ #
  # Build — sdist + wheel, validated with twine. Gates the badge.      #
  # ------------------------------------------------------------------ #
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ------------------------------------------------------------------ #
  # Publish to PyPI on a published GitHub release, via Trusted          #
  # Publishing (OIDC) — no API token stored in the repository.         #
  # Requires a "pending publisher" configured on PyPI:                  #
  #   owner: msotocalvo · repo: ESFEX · workflow: ci.yml · env: pypi    #
  # ------------------------------------------------------------------ #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published'
    environment:
      name: pypi
      url: https://pypi.org/p/esfex
    permissions:
      id-token: write   # mandatory for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
